<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DSI SWAROOM</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#000;
color:#fff;
}

header{
position:relative;
}

.banner{
height:220px;
background:linear-gradient(90deg,#111,#333,#111);
}

.profile{
text-align:center;
margin-top:-50px;
}

.dp{
width:100px;
height:100px;
border-radius:50%;
background:#444;
border:4px solid white;
margin:auto;
}

.profile h2{
margin-top:10px;
}

.plus{
position:fixed;
right:20px;
bottom:20px;
width:60px;
height:60px;
border-radius:50%;
background:#00c853;
color:white;
font-size:35px;
border:none;
cursor:pointer;
}

.feed{
padding:20px;
}

.card{
background:#1b1b1b;
padding:10px;
margin-bottom:20px;
border-radius:10px;
}

.image{
height:220px;
background:#444;
border-radius:10px;
margin-bottom:10px;
display:flex;
justify-content:center;
align-items:center;
color:#bbb;
}
</style>
</head>

<body>

<header>
<div class="banner"></div>

<div class="profile">
<div class="dp"></div>
<h2>DSI SWAROOM</h2>
<p>Showroom & Home Decoration Community</p>
</div>
</header>

<div class="feed">

<div class="card">
<div class="image">Decoration Photo</div>
<h3>Living Room Design</h3>
</div>

<div class="card">
<div class="image">Showroom Decoration</div>
<h3>Modern Display</h3>
</div>

</div>

<button class="plus">+</button>

</body>
</html>
