<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DSI SWAROOM</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#000;
color:#fff;
}

.header{
height:220px;
background:linear-gradient(135deg,#111,#333);
display:flex;
align-items:center;
justify-content:center;
font-size:32px;
font-weight:bold;
}

.profile{
text-align:center;
margin-top:-40px;
}

.dp{
width:90px;
height:90px;
border-radius:50%;
background:#666;
border:4px solid #fff;
margin:auto;
}

.feed{
padding:20px;
}

.post{
background:#1a1a1a;
padding:15px;
margin-bottom:15px;
border-radius:12px;
}

.image{
height:220px;
background:#444;
border-radius:10px;
display:flex;
align-items:center;
justify-content:center;
color:#bbb;
margin-bottom:10px;
}

.upload{
position:fixed;
bottom:20px;
right:20px;
width:60px;
height:60px;
border-radius:50%;
background:#00c853;
color:#fff;
font-size:35px;
border:none;
}
</style>
</head>

<body>

<div class="header">
DSI SWAROOM
</div>

<div class="profile">
<div class="dp"></div>
<h2>DSI SWAROOM</h2>
<p>Home & Showroom Decoration</p>
</div>

<div class="feed">

<div class="post">
<div class="image">Decoration Photo</div>
<h3>Modern Living Room</h3>
<p>Beautiful home decoration.</p>
</div>

<div class="post">
<div class="image">Showroom Display</div>
<h3>Luxury Showroom</h3>
<p>Creative decoration ideas.</p>
</div>

</div>

<button class="upload">+</button>

</body>
</html>
